// ============================================================
// IMPORT VIA JSONP (puisque l'API ne supporte que GET avec callback)
// ============================================================
function log(msg, cls) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const span = cls ? `<span class="${cls}">${msg}</span>` : msg;
  el.innerHTML += span + '\n';
  el.scrollTop = el.scrollHeight;
}

let jsonpCounter = 0;
function jsonpCall(action, params) {
  return new Promise((resolve, reject) => {
    const apiUrl = document.getElementById('apiUrl').value;
    const cbName = 'imp_cb_' + Date.now() + '_' + (++jsonpCounter);
    const timeout = setTimeout(() => {
      delete window[cbName];
      if (s.parentNode) document.body.removeChild(s);
      reject(new Error('Timeout (>30s)'));
    }, 30000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (s.parentNode) document.body.removeChild(s);
      if (data && data.error) reject(new Error(data.error));
      else resolve(data);
    };
    const parts = ['action=' + encodeURIComponent(action), 'callback=' + cbName];
    if (params) {
      Object.keys(params).forEach(k => {
        if (params[k] !== undefined && params[k] !== null) {
          parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
        }
      });
    }
    const s = document.createElement('script');
    s.src = apiUrl + '?' + parts.join('&');
    s.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      if (s.parentNode) document.body.removeChild(s);
      reject(new Error('Échec de chargement du script'));
    };
    document.body.appendChild(s);
  });
}

// Une URL JSONP est limitée à ~2000 caractères dans le navigateur, donc on fait des micro-batches
// On va appeler saveProduction pour chaque jour individuellement (plus sûr)
async function lancer() {
  document.getElementById('btnImport').disabled = true;
  document.getElementById('log').style.display = 'block';
  document.getElementById('log').innerHTML = '';

  log('=== DÉBUT DE L\'IMPORT ===', 'success');
  log('Vérification de l\'API…');

  try {
    const ping = await jsonpCall('ping');
    log(`✓ API ${ping.version} opérationnelle`);
  } catch (err) {
    log('✗ Erreur ping : ' + err.message, 'error');
    document.getElementById('btnImport').disabled = false;
    return;
  }

  let imported = 0, skipped = 0, errors = 0;
  const total = PRODUCTION_DATA.length;

  for (let i = 0; i < total; i++) {
    const rec = PRODUCTION_DATA[i];
    const progress = Math.round(((i + 1) / total) * 100);

    try {
      const res = await jsonpCall('saveProduction', rec);
      if (res.action === 'created') {
        imported++;
        log(`[${i+1}/${total}] ✓ ${rec.date_travail} ajouté (${rec.kg || '?'} kg)`);
      } else if (res.action === 'updated') {
        skipped++;
        log(`[${i+1}/${total}] · ${rec.date_travail} déjà présent, mis à jour`);
      }
    } catch (err) {
      errors++;
      log(`[${i+1}/${total}] ✗ ${rec.date_travail} : ${err.message}`, 'error');
    }

    // Petite pause pour ne pas saturer l'API
    await new Promise(r => setTimeout(r, 150));
  }

  log('=== FIN DE L\'IMPORT ===', 'success');
  log(`✓ Importés : ${imported}`, 'success');
  log(`· Mis à jour : ${skipped}`);
  if (errors > 0) log(`✗ Erreurs : ${errors}`, 'error');

  document.getElementById('btnImport').disabled = false;
  document.getElementById('btnImport').textContent = '✓ Terminé — Tu peux fermer cette page';
}

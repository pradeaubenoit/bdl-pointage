<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4A47">
<title>Pointage — Blanchisserie du Limousin</title>
<style>
  body {
    margin: 0;
    background: #F4EFE6;
    color: #15140F;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .loader {
    text-align: center;
    padding: 20px;
  }
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #D9D2C2;
    border-top-color: #1F4A47;
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    color: #4A4842;
    font-size: 14px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Chargement…</div>
</div>
<script>
  // Redirige automatiquement vers pointage-salarie.html en conservant
  // tous les paramètres de l'URL (?id=...&api=...).
  // Permet aux anciens QR codes / raccourcis pointant vers /bdl-pointage/?id=...
  // de continuer à fonctionner sans modification.
  (function() {
    var search = window.location.search || '';
    var hash = window.location.hash || '';
    var target = 'pointage-salarie.html' + search + hash;
    window.location.replace(target);
  })();
</script>
</body>
</html>
